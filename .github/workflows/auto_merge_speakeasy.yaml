name: Auto-merge Speakeasy PRs

on:
  pull_request:
    types: [opened]

jobs:
  auto-merge:
    if: startsWith(github.head_ref, 'speakeasy-sdk-regen-')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge
        run: gh pr merge ${{ github.event.pull_request.number }} --auto --squash --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
