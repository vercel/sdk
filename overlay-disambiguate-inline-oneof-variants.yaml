overlay: 1.0.0
info:
  title: Disambiguate inline oneOf variants
  version: 0.0.1
actions:
  # 1. Five inline `job` variants share an identical inline gitHashtagVercel enum
  #    that gets numbered ordinals; some collide across files.
  - target: $.components.schemas.UserEvent.properties.payload.oneOf[75].properties.job.oneOf[0]
    update: { title: BitbucketPushJob }
  - target: $.components.schemas.UserEvent.properties.payload.oneOf[75].properties.job.oneOf[2]
    update: { title: PrJob }
  - target: $.components.schemas.UserEvent.properties.payload.oneOf[75].properties.job.oneOf[3]
    update: { title: PushJob }
  - target: $.components.schemas.UserEvent.properties.payload.oneOf[75].properties.job.oneOf[5]
    update: { title: GitlabPushJob }
  - target: $.components.schemas.UserEvent.properties.payload.oneOf[75].properties.job.oneOf[7]
    update: { title: VercelPushJob }
  # 2. updateFlagSegment 200 oneOf has inline `typeName: ["segment"]` next to $ref Segment
  - target: $.paths['/v1/projects/{projectIdOrName}/feature-flags/segments/{segmentIdOrSlug}'].patch.responses.200.content['application/json'].schema.oneOf[0]
    update: { title: LocalSegment }
  # 3. updateFlag 200 oneOf has inline `typeName: ["flag"]` next to $ref Flag
  - target: $.paths['/v1/projects/{projectIdOrName}/feature-flags/flags/{flagIdOrSlug}'].patch.responses.200.content['application/json'].schema.oneOf[0]
    update: { title: LocalFlag }
