overlay: 1.0.0
x-speakeasy-jsonpath: rfc9535
info:
  title: Update spec title to "Vercel SDK"
  version: 0.0.2
actions:
  # Update info
  - target: $.info
    update:
      description: The [`@vercel/sdk`](https://www.npmjs.com/package/@vercel/sdk) is a type-safe Typescript SDK that allows you to access the resources and methods of the Vercel REST API. Learn how to [install it](https://vercel.com/docs/rest-api/sdk#installing-vercel-sdk) and [authenticate](https://vercel.com/docs/rest-api/sdk#authentication) with a Vercel access token.
      title: Vercel REST API & SDK
  # Disable test for runCommand — mock server returns 405
  - target: $.paths['/v1/sandboxes/{sandboxId}/cmd'].post
    update:
      x-speakeasy-test: false
  # Disable test for runSessionCommand — mock server returns 405
  - target: $.paths['/v2/sandboxes/sessions/{sessionId}/cmd'].post
    update:
      x-speakeasy-test: false
  # Fix updateFlagSegment mock server codegen name collision: the response
  # oneOf has an inline Segment definition AND a $ref to components/Segment,
  # producing duplicate Go types. Replace redundant oneOf with direct $ref.
  - target: $.paths['/v1/projects/{projectIdOrName}/feature-flags/segments/{segmentIdOrSlug}'].patch.responses['200'].content['application/json'].schema.oneOf
    remove: true
  - target: $.paths['/v1/projects/{projectIdOrName}/feature-flags/segments/{segmentIdOrSlug}'].patch.responses['200'].content['application/json'].schema
    update:
      $ref: '#/components/schemas/Segment'
  # 1. Five inline `job` variants share an identical inline gitHashtagVercel enum
  #    that gets numbered ordinals; some collide across files.
  - target: $.components.schemas.UserEvent.properties.payload.oneOf[75].properties.job.oneOf[0]
    update:
      title: BitbucketPushJob
  - target: $.components.schemas.UserEvent.properties.payload.oneOf[75].properties.job.oneOf[2]
    update:
      title: PrJob
  - target: $.components.schemas.UserEvent.properties.payload.oneOf[75].properties.job.oneOf[3]
    update:
      title: PushJob
  - target: $.components.schemas.UserEvent.properties.payload.oneOf[75].properties.job.oneOf[5]
    update:
      title: GitlabPushJob
  - target: $.components.schemas.UserEvent.properties.payload.oneOf[75].properties.job.oneOf[7]
    update:
      title: VercelPushJob
  # 2. updateFlagSegment 200 oneOf has inline `typeName: ["segment"]` next to $ref Segment
  - target: $.paths['/v1/projects/{projectIdOrName}/feature-flags/segments/{segmentIdOrSlug}'].patch.responses.200.content['application/json'].schema.oneOf[0]
    update:
      title: LocalSegment
  # 3. updateFlag 200 oneOf has inline `typeName: ["flag"]` next to $ref Flag
  - target: $.paths['/v1/projects/{projectIdOrName}/feature-flags/flags/{flagIdOrSlug}'].patch.responses.200.content['application/json'].schema.oneOf[0]
    update:
      title: LocalFlag
